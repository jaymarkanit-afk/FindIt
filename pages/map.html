<div class="hero" style="padding-bottom: 18px">
  <div class="hero-gradient"></div>
  <div class="hero-grain"></div>
  <div class="hero-deco"></div>
  <div class="hero-inner">
    <div class="hero-badge">
      <span class="live-dot"></span>Map View · Butuan City
    </div>
    <h1 class="hero-h1">Explore<br /><em>cafés</em> near you</h1>
    <div class="hero-search">
      <span style="font-size: 17px">📍</span
      ><input type="text" placeholder="Search in Butuan City…" /><button
        class="filter-trigger"
        onclick="openDrawer()"
      >
        ☰ Filters
      </button>
    </div>
  </div>
</div>
<div class="map-container">
  <!-- GEOLOCATION INFO CARD (LEFT SIDE) -->
  <div class="geo-info-card">
    <div class="geo-header">📍 Your Location</div>
    <div class="geo-location" id="geo-location">Butuan City, Philippines</div>
    <div class="geo-stats">
      <div class="geo-stat">
        <div class="geo-stat-label">Cafés Nearby</div>
        <div class="geo-stat-value" id="geo-cafe-count">8</div>
      </div>
      <div class="geo-stat">
        <div class="geo-stat-label">Nearest</div>
        <div class="geo-stat-value" id="geo-nearest-dist">2.5 km</div>
      </div>
    </div>
    <button class="geo-refresh-btn" onclick="locateMe()">🔄 Locate Me</button>
  </div>

  <div
    id="butuan-map"
    class="osm-map"
    style="width: 100%; height: 500px; border-radius: var(--r)"
  ></div>
  <div class="map-ui-overlay">
    <div class="map-toggle-btn">
      <div class="mtg on" onclick="mtgClick(this, 'map')">🗺 Map</div>
      <div class="mtg" onclick="mtgClick(this, 'list')">☰ List</div>
    </div>
    <button class="map-locate" onclick="locateMe()">◎</button>
  </div>
  <div class="map-popup" id="map-popup">
    <button class="popup-close" onclick="closePopup()">✕</button>
    <img class="popup-img" id="popup-img" src="" alt="" />
    <div class="popup-body">
      <div class="popup-name" id="popup-name"></div>
      <div class="popup-meta" id="popup-meta"></div>
      <div class="popup-actions">
        <div
          class="popup-btn"
          onclick="
            closePopup();
            showToast('Saved! 🔖');
          "
        >
          📌 Save
        </div>
        <div
          class="popup-btn primary"
          onclick="
            showPanel('profile');
            closePopup();
          "
        >
          View Café →
        </div>
      </div>
    </div>
  </div>
</div>
<div class="map-filter-row">
  <div class="mf on" onclick="mfClick(this)">All</div>
  <div class="mf" onclick="mfClick(this)">📍 findItNearMe</div>
  <div class="mf" onclick="mfClick(this)">⭐ findItTopRated</div>
  <div class="mf" onclick="mfClick(this)">🔥 findItTrending</div>
  <div class="mf" onclick="mfClick(this)">💼 findItJob</div>
  <div class="mf" onclick="mfClick(this)">🎉 findItEvents</div>
  <div class="mf" onclick="mfClick(this)">📚 findItNew</div>
</div>
<div style="height: 32px"></div>
